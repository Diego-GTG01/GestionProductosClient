<div class="card border-0 bg-light rounded-0 shadow-sm mb-3 position-fixed top-0 start-0 w-100 z-3">
  <div class="card-body d-flex align-items-center justify-content-between flex-wrap py-3 px-4">
    <div class="d-flex align-items-center">
      <button
        type="button"
        class="btn rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm btn-light border border-2 border-primary text-primary p-0"
        (click)="verPerfil()"
        style="width: 50px; height: 50px"
        title="Ver perfil"
      >
        <i class="bi bi-person-fill fs-4"></i>
      </button>
      <div>
        <span class="text-muted small d-block fw-medium mb-0 text-uppercase tracking-wider">
          Sesión iniciada
        </span>

        <h6 class="mb-1 fw-bold text-dark fs-5">
          {{ username }}
        </h6>

        <span
          class="badge rounded-pill"
          [ngClass]="{
            'text-bg-primary': rol === 'ADMINISTRADOR',
            'text-bg-success': rol === 'USUARIO',
            'text-bg-warning text-dark': rol === 'SUPERVISOR',
          }"
        >
          <i class="bi bi-shield-fill-check me-1"></i>
          {{ rol }}
        </span>
      </div>
    </div>

    <button
      class="btn btn-logout px-4 py-2 rounded-pill fw-medium mt-3 mt-sm-0 transition-all d-flex align-items-center"
      (click)="logout()"
    >
      <i class="bi bi-box-arrow-right me-2 fs-5"></i>
      <span>Cerrar sesión</span>
    </button>
  </div>
</div>
