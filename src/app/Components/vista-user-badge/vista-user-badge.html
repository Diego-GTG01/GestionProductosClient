<!-- Se agregaron las clases: position-fixed top-0 start-0 w-100 z-3 -->
<div class="card border-0 bg-light rounded-0 shadow-sm mb-3 position-fixed top-0 start-0 w-100 z-3">
  <div class="card-body d-flex align-items-center justify-content-between flex-wrap py-3 px-4">
    <div class="d-flex align-items-center">
      <div
        class="rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm text-primary"
        style="width: 30px; height: 30px"
      >
        <i class="bi bi-person-fill" style="width: max-content; height: max-content;"></i>
      </div>
      <div>
        <span class="text-muted small d-block fw-medium mb-0 text-uppercase tracking-wider"
          >Sesión iniciada</span
        >
        <h6 class="mb-0 fw-bold text-dark fs-5">
          {{ username }}
        </h6>
      </div>
    </div>

    <button
      class="btn btn-logout px-4 py-2 rounded-pill fw-medium mt-3 mt-sm-0 transition-all d-flex align-items-center"
      (click)="logout()"
    >
      <i class="bi bi-box-arrow-right me-2 fs-5"></i>
      <span>Cerrar sesión</span>
    </button>
  </div>
</div>
